<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本人メジャーリーガー成績ダッシュボード</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>⚾ 日本人メジャーリーガー成績ダッシュボード</h1>
      <div class="header-right">
        <span id="updated" class="updated">最終更新: —</span>
        <button id="update-btn" class="update-btn">🔄 更新</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="status" class="status"></div>

    <section class="section">
      <h2 class="section-title">📅 最新試合のハイライト</h2>
      <div id="highlights" class="highlights"></div>
    </section>

    <section class="section">
      <h2 class="section-title">⚾ 投手</h2>
      <div id="pitchers" class="card-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">🏏 野手</h2>
      <div id="batters" class="card-grid"></div>
    </section>
  </main>

  <footer class="footer">
    データ提供: MLB公式 StatsAPI ／ このページは自分用のローカルツールです
  </footer>

  <script src="/app.js"></script>
</body>
</html>
