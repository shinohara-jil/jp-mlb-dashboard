name: 成績を毎朝自動更新

# いつ動かすか
on:
  schedule:
    # 毎日 01:00 UTC（＝日本時間 朝10:00 ごろ）に自動実行
    - cron: "0 1 * * *"
  workflow_dispatch:  # GitHubの画面から手動でも実行できる

# リポジトリにデータを書き込む（コミットする）ための権限
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python を準備
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 最新成績を取得して保存
        run: python fetch_stats.py

      - name: 変更があればコミットして反映
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "変更なし（試合がない・更新不要）"
          else
            git commit -m "成績を自動更新 ($(date -u +%Y-%m-%d))"
            git push
          fi
