<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日本人メジャーリーガー成績ダッシュボード</title>
  <link rel="stylesheet" href="style.css?v=2026-06-04b">

  <!-- PWA（ホーム画面に置けるアプリ風）設定 -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1B3A5C">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="日本人MLB成績">
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>⚾ 日本人メジャーリーガー成績ダッシュボード</h1>
      <div class="header-right">
        <span id="updated" class="updated">最終更新: —</span>
        <button id="update-btn" class="update-btn">🔄 更新</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div id="status" class="status"></div>

    <div id="league-filter" class="league-filter" role="group" aria-label="リーグで絞り込み">
      <span class="filter-label">リーグ:</span>
      <button class="filter-btn is-active" data-league="ALL">全部</button>
      <button class="filter-btn" data-league="AL">ア・リーグ</button>
      <button class="filter-btn" data-league="NL">ナ・リーグ</button>
    </div>

    <section class="section">
      <h2 class="section-title">📅 最新試合のハイライト</h2>
      <div id="highlights" class="highlights"></div>
    </section>

    <section class="section">
      <h2 class="section-title">⚾ 投手</h2>
      <div id="pitchers" class="card-grid"></div>
    </section>

    <section class="section">
      <h2 class="section-title">🏏 野手</h2>
      <div id="batters" class="card-grid"></div>
    </section>
  </main>

  <footer class="footer">
    データ提供: MLB公式 StatsAPI ／ 毎朝 日本時間10時ごろに自動更新
  </footer>

  <!-- ?v=日付 はキャッシュ対策。app.js / style.css を更新したらこの日付も合わせて変えること（古いファイルが読まれるのを防ぐ） -->
  <script src="app.js?v=2026-06-04b"></script>

  <!-- 以前のオフライン機能(サービスワーカー)は廃止。古い登録を解除し、残ったキャッシュを掃除する。 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then((regs) => regs.forEach((r) => r.unregister()));
    }
    if (window.caches && caches.keys) {
      caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
    }
  </script>
</body>
</html>
